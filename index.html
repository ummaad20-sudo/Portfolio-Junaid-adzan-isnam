<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junaid Adzan Isnam, ST — Electrical Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #f59e0b;
    --accent2: #3b82f6;
    --accent3: #10b981;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: #1e2d45;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── GRID NOISE BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 4rem;
    background: rgba(10,14,23,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    color: var(--accent);
  }

  .nav-links { display: flex; gap: 2rem; }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 8rem 4rem 4rem;
    position: relative;
    z-index: 1;
    gap: 4rem;
  }

  .hero-left { position: relative; }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    padding: 0.35rem 0.8rem;
    border-radius: 2px;
    margin-bottom: 2rem;
    animation: fadeUp 0.8s ease both;
  }
  .hero-tag::before {
    content: '▶';
    font-size: 0.5rem;
  }

  .hero-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.5rem, 8vw, 7rem);
    line-height: 0.9;
    letter-spacing: 0.02em;
    animation: fadeUp 0.8s 0.1s ease both;
  }

  .hero-name span { color: var(--accent); }

  .hero-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    color: var(--accent2);
    letter-spacing: 0.08em;
    margin: 1.5rem 0;
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .hero-desc {
    color: var(--muted);
    font-size: 0.95rem;
    max-width: 480px;
    line-height: 1.8;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .hero-cta {
    display: flex;
    gap: 1rem;
    margin-top: 2.5rem;
    animation: fadeUp 0.8s 0.4s ease both;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0e17;
    padding: 0.8rem 2rem;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  }
  .btn-primary:hover { background: #fbbf24; transform: translateY(-2px); }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    padding: 0.8rem 2rem;
    font-weight: 400;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ── HERO RIGHT: Stats Card ── */
  .hero-right {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    animation: fadeLeft 1s 0.3s ease both;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }
  .stat-card:nth-child(2)::before { background: var(--accent2); }
  .stat-card:nth-child(3)::before { background: var(--accent3); }
  .stat-card:hover { transform: translateX(4px); border-color: rgba(245,158,11,0.3); }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    line-height: 1;
    color: var(--accent);
    min-width: 80px;
  }
  .stat-card:nth-child(2) .stat-num { color: var(--accent2); }
  .stat-card:nth-child(3) .stat-num { color: var(--accent3); }

  .stat-info h4 {
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .stat-info p {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  /* ── SECTION COMMON ── */
  section {
    padding: 6rem 4rem;
    position: relative;
    z-index: 1;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 3.5rem;
  }

  .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.2);
    padding: 0.2rem 0.6rem;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 4vw, 3.5rem);
    letter-spacing: 0.05em;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ── ABOUT ── */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    align-items: start;
  }

  .about-text p {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.9;
    margin-bottom: 1.2rem;
  }

  .contact-list { display: flex; flex-direction: column; gap: 0.8rem; }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.8rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .contact-icon {
    width: 32px;
    height: 32px;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    color: var(--accent);
    flex-shrink: 0;
  }

  /* ── SKILLS ── */
  .skills-section { background: var(--surface); }

  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .skill-category {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 1.8rem;
    position: relative;
    transition: border-color 0.3s;
  }
  .skill-category:hover { border-color: rgba(245,158,11,0.4); }

  .skill-category-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1.2rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid var(--border);
  }

  .skill-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .skill-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.3rem 0.7rem;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    cursor: default;
  }
  .skill-tag:hover {
    background: rgba(245,158,11,0.1);
    border-color: rgba(245,158,11,0.4);
    color: var(--accent);
  }

  /* ── EXPERIENCE ── */
  .experience-timeline { position: relative; }
  .experience-timeline::before {
    content: '';
    position: absolute;
    left: 11px; top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, var(--accent), var(--accent2), var(--border));
  }

  .exp-item {
    display: grid;
    grid-template-columns: 24px 1fr;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
    position: relative;
  }

  .exp-dot {
    width: 24px;
    height: 24px;
    background: var(--bg);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 0.3rem;
    position: relative;
    z-index: 1;
  }
  .exp-dot::after {
    content: '';
    width: 8px;
    height: 8px;
    background: var(--accent);
  }

  .exp-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.5rem;
    transition: border-color 0.3s;
  }
  .exp-card:hover { border-color: rgba(245,158,11,0.3); }

  .exp-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; flex-wrap: wrap; gap: 0.5rem; }

  .exp-company {
    font-weight: 600;
    font-size: 1rem;
    color: var(--text);
  }

  .exp-period {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.2);
    padding: 0.2rem 0.6rem;
    white-space: nowrap;
  }

  .exp-role {
    font-size: 0.8rem;
    color: var(--accent2);
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  .exp-desc {
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.7;
  }

  .exp-desc li {
    list-style: none;
    padding-left: 1rem;
    position: relative;
    margin-bottom: 0.3rem;
  }
  .exp-desc li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 0.7rem;
  }

  /* ── EDUCATION ── */
  .edu-section { background: var(--surface); }

  .edu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.5rem;
  }

  .edu-card {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 1.8rem;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }
  .edu-card.featured {
    border-color: rgba(245,158,11,0.3);
    background: linear-gradient(135deg, rgba(245,158,11,0.05), var(--bg));
  }
  .edu-card:hover { transform: translateY(-4px); border-color: rgba(245,158,11,0.4); }

  .edu-badge {
    position: absolute;
    top: -1px; right: 1.5rem;
    background: var(--accent);
    color: #0a0e17;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 0.2rem 0.6rem;
    letter-spacing: 0.1em;
  }

  .edu-year {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }

  .edu-school {
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 0.3rem;
  }

  .edu-major {
    font-size: 0.8rem;
    color: var(--accent2);
    margin-bottom: 0.5rem;
  }

  .edu-gpa {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .edu-gpa span {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0;
  }

  /* ── PROJECTS ── */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1.5rem;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }
  .project-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0);
    transition: transform 0.3s;
  }
  .project-card:hover { transform: translateY(-4px); border-color: rgba(59,130,246,0.3); }
  .project-card:hover::after { transform: scaleX(1); }

  .project-icon {
    width: 48px; height: 48px;
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    margin-bottom: 1.2rem;
  }

  .project-title {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
    letter-spacing: 0.03em;
  }

  .project-desc {
    color: var(--muted);
    font-size: 0.83rem;
    line-height: 1.7;
  }

  /* ── CERTIFICATIONS ── */
  .certs-section { background: var(--surface); }

  .certs-list { display: flex; flex-direction: column; gap: 1rem; }

  .cert-item {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    transition: all 0.2s;
  }
  .cert-item:hover {
    border-color: rgba(16,185,129,0.4);
    transform: translateX(6px);
  }

  .cert-badge {
    width: 36px; height: 36px;
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent3);
    font-size: 0.9rem;
    flex-shrink: 0;
  }

  .cert-text h4 { font-size: 0.9rem; font-weight: 500; }
  .cert-text p { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }

  /* ── FOOTER ── */
  footer {
    padding: 3rem 4rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    position: relative;
    z-index: 1;
  }

  .footer-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.1em;
    color: var(--accent);
  }

  .footer-copy {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeLeft {
    from { opacity: 0; transform: translateX(30px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Scroll reveal */
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: none;
  }

  /* ── TERMINAL INTRO ── */
  #terminal-intro {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 3rem 4rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    color: #00ff41;
    overflow: hidden;
  }
  #terminal-intro .t-line {
    opacity: 0;
    white-space: nowrap;
    overflow: hidden;
    border-right: 2px solid #00ff41;
    width: 0;
    animation: termType 0.5s steps(40) forwards;
  }
  #terminal-intro .t-line.done { border-right: none; }
  .t-prompt { color: var(--accent); margin-right: 0.5rem; }
  .t-dim { color: #444; }
  .t-green { color: #00ff41; }
  .t-skip {
    position: absolute;
    bottom: 2rem; right: 3rem;
    font-size: 0.7rem;
    color: #444;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: color 0.2s;
  }
  .t-skip:hover { color: #00ff41; }

  @keyframes termType {
    from { width: 0; opacity: 1; }
    to   { width: 100%; opacity: 1; }
  }

  /* ── PARTICLES CANVAS ── */
  #particles-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.35;
  }

  /* ── TYPEWRITER HERO ── */
  .hero-name {
    cursor: pointer;
    position: relative;
    user-select: none;
  }
  .hero-name .char {
    display: inline-block;
    transition: color 0.1s, transform 0.1s;
  }
  .hero-name .char.typing {
    color: var(--accent);
    text-shadow: 0 0 20px rgba(245,158,11,0.8);
    animation: charPop 0.15s ease;
  }
  @keyframes charPop {
    0%   { transform: scaleY(1.4) translateY(-4px); }
    100% { transform: scaleY(1) translateY(0); }
  }

  .hero-name .cursor-blink {
    display: inline-block;
    width: 6px;
    background: var(--accent);
    animation: blink 0.8s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
    border-radius: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── GLITCH on hero name hover ── */
  .hero-name:hover .char {
    animation: glitchChar 0.3s ease;
  }
  @keyframes glitchChar {
    0%  { transform: none; }
    20% { transform: skewX(-5deg) translateX(2px); color: #f59e0b; }
    40% { transform: skewX(3deg) translateX(-2px); color: #3b82f6; }
    60% { transform: skewX(-2deg) translateX(1px); color: #10b981; }
    80% { transform: skewX(1deg); color: var(--text); }
    100%{ transform: none; color: inherit; }
  }

  /* ── TYPEWRITER for hero-title ── */
  .hero-title {
    position: relative;
    min-height: 1.5em;
  }
  #typed-title { display: inline; }
  #typed-cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent2);
    vertical-align: middle;
    animation: blink 0.7s step-end infinite;
    margin-left: 1px;
  }

  /* ── SCAN LINE ── */
  .hero::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(245,158,11,0.15), transparent);
    animation: scanLine 4s linear infinite;
    pointer-events: none;
    z-index: 2;
  }
  @keyframes scanLine {
    0%   { top: 0; }
    100% { top: 100%; }
  }

  /* ── CLICK HINT ── */
  .click-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-top: 0.5rem;
    opacity: 0.6;
    animation: fadeUp 1s 1.5s ease both;
  }

  /* ── PULSE RING on hero tag ── */
  .hero-tag {
    position: relative;
  }
  .hero-tag::after {
    content: '';
    position: absolute;
    inset: -4px;
    border: 1px solid rgba(245,158,11,0.4);
    animation: pulseRing 2.5s ease-out infinite;
    border-radius: 2px;
  }
  @keyframes pulseRing {
    0%   { opacity: 0.8; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.08); }
  }

  /* ── COUNTER animation ── */
  .stat-num { transition: color 0.3s; }
  .stat-card:hover .stat-num { color: var(--accent) !important; text-shadow: 0 0 20px rgba(245,158,11,0.5); }

  /* ── NEON GLOW on section titles ── */
  .section-title {
    transition: text-shadow 0.3s;
  }
  .section-header:hover .section-title {
    text-shadow: 0 0 30px rgba(245,158,11,0.3);
  }

  /* ── PROGRESS BARS for skills ── */
  .skill-bar-wrap {
    margin-top: 1rem;
  }
